<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pranadhara Alkaline Water</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Poppins', sans-serif;
    background:#f4f9fb;
    color:#333;
}

header {
    background: linear-gradient(135deg,#00b4db,#0083b0);
    color:white;
    padding:100px 20px;
    text-align:center;
}
header h1 { font-size:50px; }
header p { margin:15px 0; font-size:20px; }

.btn {
    display:inline-block;
    margin:10px;
    padding:12px 28px;
    background:white;
    color:#0083b0;
    border-radius:30px;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}
.btn:hover { background:#e0f7ff; }

.section {
    padding:70px 20px;
    text-align:center;
}
.section h2 { font-size:34px; margin-bottom:20px; }

.features, .products {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card {
    background:white;
    padding:25px;
    width:250px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}
.card:hover {
    transform:translateY(-8px);
}

.highlight {
    background:#0083b0;
    color:white;
}

footer {
    background:#0083b0;
    color:white;
    text-align:center;
    padding:25px;
}

@media(max-width:768px) {
    header h1 { font-size:36px; }
}
</style>
</head>
